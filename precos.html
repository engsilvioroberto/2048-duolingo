<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#4BC300">
<title>🏗️ Preços Estruturas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════ RESET & BASE ═══════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#F0FFE1;color:#1A1A1A;min-height:100dvh;overflow-x:hidden
}

/* ═══════════════════════════════ HEADER ═══════════════════════════════ */
.header{
  background:linear-gradient(135deg,#4BC300 0%,#78D22D 100%);
  border-radius:0 0 24px 24px;padding:24px 20px 28px;color:#fff;text-align:center
}
.header h1{font-size:1.6rem;font-weight:900;letter-spacing:-0.5px;margin-bottom:4px}
.header .sub{font-size:0.85rem;opacity:.85;font-weight:500;margin-bottom:12px}
.header .stats{display:flex;justify-content:center;gap:20px;font-size:0.75rem;font-weight:600}
.header .stats span{background:rgba(255,255,255,.15);padding:4px 14px;border-radius:20px}

/* ═══════════════════════════════ FILTERS ═══════════════════════════════ */
.filters{
  padding:16px 16px 8px;max-width:760px;margin:0 auto;
  display:flex;flex-direction:column;gap:10px
}
.filters-row{display:flex;gap:10px;flex-wrap:wrap}
.filter-input,.filter-select{
  flex:1;min-width:160px;padding:12px 16px;border:2px solid #D6E8C8;
  border-radius:14px;font-family:inherit;font-size:0.9rem;font-weight:500;
  background:#fff;color:#1A1A1A;outline:none;transition:border-color .2s
}
.filter-input:focus,.filter-select:focus{border-color:#4BC300}
.filter-input::placeholder{color:#aaa}
.filter-clear{
  padding:12px 18px;border:2px solid #D6E8C8;border-radius:14px;
  background:#fff;color:#666;font-family:inherit;font-size:0.85rem;
  font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap
}
.filter-clear:hover{border-color:#4BC300;color:#4BC300}
.filter-count{
  font-size:0.8rem;color:#999;font-weight:500;text-align:center;padding:2px 0 8px
}

/* ═══════════════════════════════ CARD GRID ═══════════════════════════════ */
.grid{
  max-width:760px;margin:0 auto;padding:4px 12px 24px;
  display:grid;grid-template-columns:1fr;gap:12px
}
@media(min-width:600px){.grid{grid-template-columns:1fr 1fr;gap:14px;padding:4px 16px 24px}}

/* ── Card ── */
.card{
  background:#fff;border-radius:16px;padding:16px;
  box-shadow:0 2px 8px rgba(75,195,0,.10);
  transition:box-shadow .2s;position:relative;overflow:hidden
}
.card:hover{box-shadow:0 4px 16px rgba(75,195,0,.16)}

.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.card-code{
  background:#E8F5DC;color:#3C9600;font-size:0.7rem;font-weight:800;
  padding:3px 8px;border-radius:8px;letter-spacing:0.3px;white-space:nowrap
}
.card-cat{
  font-size:0.65rem;color:#999;font-weight:500;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;direction:rtl;text-align:left;max-width:50%
}
.card-name{
  font-size:0.85rem;font-weight:600;color:#1A1A1A;line-height:1.4;
  margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden
}

.card-price-row{display:flex;align-items:baseline;gap:6px;margin-bottom:4px}
.card-price{font-size:1.4rem;font-weight:800;color:#4BC300;line-height:1}
.card-unit{font-size:0.75rem;font-weight:600;color:#999}
.card-desc{
  font-size:0.72rem;color:#666;line-height:1.5;margin:6px 0 10px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden
}

/* ── Insumos toggle ── */
.insumos-toggle{
  display:inline-flex;align-items:center;gap:6px;
  font-size:0.78rem;font-weight:600;color:#4BC300;
  cursor:pointer;padding:6px 0;border:none;background:none;
  font-family:inherit;transition:color .2s
}
.insumos-toggle:hover{color:#3C9600}
.insumos-toggle .arrow{transition:transform .25s ease;font-size:0.7rem}
.insumos-toggle.open .arrow{transform:rotate(90deg)}

.insumos-body{max-height:0;overflow:hidden;transition:max-height .35s ease,margin .35s ease;margin-top:0}
.insumos-body.open{max-height:2000px;margin-top:12px}
.insumos-table{width:100%;border-collapse:collapse;font-size:0.72rem}
.insumos-table th{
  text-align:left;font-size:0.6rem;font-weight:700;color:#999;
  text-transform:uppercase;letter-spacing:0.5px;padding:4px 6px;
  border-bottom:1px solid #E8F5DC;
}
.insumos-table td{padding:5px 6px;border-bottom:1px solid #f5f5f5;color:#444}
.insumos-table tr:last-child td{border-bottom:none}
.insumos-table .num{text-align:right;font-weight:600;white-space:nowrap}
.insumos-table .cat-row td{
  font-weight:700;color:#3C9600;font-size:0.68rem;
  background:#F0FFE1;padding:6px;border-radius:8px;
  border-bottom:2px solid #D6E8C8;
}
.insumos-table .total-row td{
  font-weight:700;color:#1A1A1A;border-top:2px solid #4BC300;
  padding-top:8px;font-size:0.78rem;background:#F8FFF0
}

/* ── Subcategory badge ── */
.subcat-badge{
  display:inline-block;font-size:0.6rem;font-weight:600;color:#666;
  background:#F0FFE1;padding:2px 8px;border-radius:6px;margin-bottom:8px
}

/* ═══════════════════════════════ LOADING / EMPTY ═══════════════════════════════ */
.loading,.empty{
  text-align:center;padding:60px 20px;color:#999;font-size:1rem;font-weight:500
}
.loading .spinner{
  display:inline-block;width:36px;height:36px;border:4px solid #D6E8C8;
  border-top-color:#4BC300;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ═══════════════════════════════ RESPONSIVE ═══════════════════════════════ */
@media(max-width:380px){
  .header h1{font-size:1.3rem}
  .card-price{font-size:1.2rem}
  .filters{padding:12px 10px 4px}
  .grid{padding:4px 8px 16px}
}
</style>
</head>
<body>

<div id="app">
  <!-- Header -->
  <header class="header">
    <h1>🏗️ Preços Estruturas</h1>
    <p class="sub">Composição de custos · CYPE Gerador de Preços Brasil</p>
    <div class="stats">
      <span id="statsTotal">— itens</span>
      <span id="statsAvg">— médio</span>
    </div>
  </header>

  <!-- Filters -->
  <div class="filters">
    <div class="filters-row">
      <input class="filter-input" id="searchInput" type="text" placeholder="🔍 Buscar por nome, código, descrição..." autocomplete="off">
      <select class="filter-select" id="catFilter"><option value="">Todas as categorias</option></select>
      <button class="filter-clear" id="clearBtn">✕ Limpar</button>
    </div>
    <div class="filter-count" id="filterCount"></div>
  </div>

  <!-- Grid -->
  <div class="grid" id="grid"><div class="loading"><div class="spinner"></div><p>Carregando dados...</p></div></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════════════════════
let allItems = [];

async function loadData() {
  try {
    const res = await fetch('precos_estruturas.json');
    const data = await res.json();
    allItems = data.items || [];
    init();
  } catch(e) {
    document.getElementById('grid').innerHTML =
      `<div class="empty">❌ Erro ao carregar dados: ${e.message}</div>`;
  }
}

// ═══════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════
function getSubcat(cat) {
  const parts = (cat || '').split('/');
  return parts[1] || parts[0] || 'Geral';
}

function renderCard(item) {
  const subcat = getSubcat(item.categoria);
  const insumos = item.insumos || [];
  const hasInsumos = insumos.length > 0;
  const insumosId = 'i-' + (item.codigo || Math.random().toString(36).slice(2));

  // Group insumos by category_insumo
  let grouped = [];
  let currentCat = '';
  for (const ins of insumos) {
    if (ins.categoria_insumo && ins.categoria_insumo !== currentCat) {
      currentCat = ins.categoria_insumo;
      grouped.push({type:'cat',label:currentCat});
    }
    grouped.push({type:'row',data:ins});
  }
  // Find total
  const total = item.total || item.preco;

  let insumosHTML = '';
  if (hasInsumos) {
    let rows = '';
    for (const g of grouped) {
      if (g.type === 'cat') {
        rows += `<tr class="cat-row"><td colspan="5">📂 ${g.label}</td></tr>`;
      } else {
        const d = g.data;
        rows += `<tr>
          <td>${d.codigo || ''}</td>
          <td>${d.descricao}</td>
          <td class="num">${d.quantidade || d.rendimento || ''}</td>
          <td class="num">${d.preco_unitario ? 'R$ '+d.preco_unitario : ''}</td>
          <td class="num">${d.custo ? 'R$ '+d.custo : ''}</td>
        </tr>`;
      }
    }
    if (total) {
      rows += `<tr class="total-row"><td colspan="4">Total</td><td class="num">${total}</td></tr>`;
    }
    insumosHTML = `
      <button class="insumos-toggle" onclick="toggleInsumos('${insumosId}')">
        <span class="arrow">▶</span> Ver composição (${hasInsumos} insumos)
      </button>
      <div class="insumos-body" id="${insumosId}">
        <table class="insumos-table">
          <thead><tr><th>Código</th><th>Descrição</th><th>Rend.</th><th>Preço Un.</th><th>Custo</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  return `
    <div class="card" data-codigo="${item.codigo || ''}" data-nome="${(item.nome||'').toLowerCase()}" data-cat="${item.categoria||''}" data-subcat="${subcat}">
      <div class="card-header">
        <span class="card-code">${item.codigo || '—'}</span>
        <span class="card-cat" title="${item.categoria || ''}">${item.categoria ? '…'+item.categoria.slice(-30) : ''}</span>
      </div>
      <div class="subcat-badge">${subcat}</div>
      <div class="card-name">${item.nome || 'Sem nome'}</div>
      <div class="card-price-row">
        <span class="card-price">${item.preco || '—'}</span>
        <span class="card-unit">/ ${item.unidade || '—'}</span>
      </div>
      ${item.descricao ? `<div class="card-desc">${item.descricao}</div>` : ''}
      ${insumosHTML}
    </div>`;
}

function renderGrid(items) {
  const grid = document.getElementById('grid');
  if (!items.length) {
    grid.innerHTML = '<div class="empty">🔍 Nenhum item encontrado com esses filtros</div>';
    return;
  }
  grid.innerHTML = items.map(renderCard).join('');
}

// ═══════════════════════════════════════════════════════════
//  FILTERS
// ═══════════════════════════════════════════════════════════
function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const cat = document.getElementById('catFilter').value;

  return allItems.filter(item => {
    if (q) {
      const nome = (item.nome || '').toLowerCase();
      const cod = (item.codigo || '').toLowerCase();
      const desc = (item.descricao || '').toLowerCase();
      const catStr = (item.categoria || '').toLowerCase();
      const found = nome.includes(q) || cod.includes(q) || desc.includes(q) || catStr.includes(q);
      if (!found) return false;
    }
    if (cat) {
      if (getSubcat(item.categoria) !== cat) return false;
    }
    return true;
  });
}

function update() {
  const filtered = getFiltered();
  renderGrid(filtered);
  document.getElementById('filterCount').textContent =
    filtered.length === allItems.length
      ? `Mostrando todos os ${allItems.length} itens`
      : `Mostrando ${filtered.length} de ${allItems.length} itens`;
}

// ═══════════════════════════════════════════════════════════
//  INSUMOS TOGGLE
// ═══════════════════════════════════════════════════════════
function toggleInsumos(id) {
  const body = document.getElementById(id);
  const btn = body.previousElementSibling;
  if (!body || !btn) return;
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open');
  btn.classList.toggle('open');
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
function init() {
  // Stats
  document.getElementById('statsTotal').textContent = `${allItems.length} itens`;
  const prices = allItems.filter(i => i.preco).map(i => {
    const n = parseFloat(i.preco.replace(/[R$\s.]/g,'').replace(',','.'));
    return isNaN(n) ? 0 : n;
  });
  if (prices.length) {
    const avg = prices.reduce((a,b)=>a+b,0) / prices.length;
    const fmt = avg.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
    document.getElementById('statsAvg').textContent = `R$ ${fmt} médio`;
  }

  // Category dropdown
  const cats = [...new Set(allItems.map(i => getSubcat(i.categoria)).filter(Boolean))].sort();
  const sel = document.getElementById('catFilter');
  cats.forEach(c => { sel.innerHTML += `<option value="${c}">${c}</option>`; });

  // Events
  document.getElementById('searchInput').addEventListener('input', update);
  document.getElementById('catFilter').addEventListener('change', update);
  document.getElementById('clearBtn').addEventListener('click', () => {
    document.getElementById('searchInput').value = '';
    document.getElementById('catFilter').value = '';
    update();
  });

  update();
}

// ═══════════════════════════════════════════════════════════
//  START
// ═══════════════════════════════════════════════════════════
loadData();
</script>
</body>
</html>
